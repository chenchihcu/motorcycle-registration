[build]
  command = ""echo 'Static site - ready for deployment'""
  functions = ""netlify/functions""
  publish = "".""

[dev]
  framework = ""flask""

[[redirects]]
  from = ""/static/*""
  to = ""/static/:splat""
  status = 200

[[redirects]]
  from = ""/*""
  to = ""/.netlify/functions/api""
  status = 200

[build.environment]
  PYTHON_VERSION = ""3.14""
