{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-5">
        <div class="card shadow raised nature-card nature-card-waterfall">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-3">使用 Google 登入</h3>
                <p class="text-muted text-center mb-4">一般使用者不再建立本地帳密。請回登入頁使用 Google 帳號登入，首次登入後再補齊報名資料。</p>
                <div class="d-grid">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right me-1"></i>前往登入
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
